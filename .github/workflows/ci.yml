name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      # actions/checkout@v5
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false
      - name: Set up Rust
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt --component clippy
          rustup default stable
      # Swatinem/rust-cache@v2
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
      - name: Check formatting
        run: cargo fmt --all --check
      - name: Check workspace
        run: cargo check
      - name: Lint workspace
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Test workspace
        run: cargo test

  benchmark:
    name: Benchmark Metadata
    runs-on: ubuntu-latest
    steps:
      # actions/checkout@v5
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false
      # actions/setup-python@v6
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"
      - name: Check benchmark Python syntax
        run: python -m py_compile benchmark/run.py benchmark/test_run.py
      - name: Test benchmark runner
        run: python benchmark/test_run.py
      - name: Validate benchmark corpus
        run: python benchmark/run.py --validate-only
